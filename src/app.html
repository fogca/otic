<!doctype html>
<html lang="en" data-lang="en">
	<head>
		<meta charset="utf-8" />
		<!-- viewport-fit=cover lets the page's own background extend behind the
		     iOS Safari toolbar (top status bar + bottom floating address bar)
		     instead of Safari showing its own default fill there. Any
		     position:fixed UI anchored near a physical edge must then pad
		     itself with env(safe-area-inset-*) so it isn't obscured. -->
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#ffffff" />
		<!-- Decide the language before first paint (avoids a flash of the
		     wrong one). An explicit choice from this tab session
		     (sessionStorage, cleared on tab/browser close) always wins;
		     otherwise fall back to the browser's own language. Mirrored in
		     lib/state/lang.svelte.ts's restore() — keep the two in sync. -->
		<script>
			try {
				var savedLang = sessionStorage.getItem('ti-lang');
				var detectedLang =
					savedLang === 'en' || savedLang === 'ja'
						? savedLang
						: (navigator.language || '').toLowerCase().startsWith('ja')
							? 'ja'
							: 'en';
				if (detectedLang === 'ja') {
					document.documentElement.dataset.lang = 'ja';
				}
			} catch (e) {}
		</script>
		<!-- FONTPLUS — Tazugane Gothic webfont loader (defer: non render-blocking) -->
		<script defer src="https://webfont.fontplus.jp/accessor/script/fontplus.js?kqbwQX--jVA%3D&box=-1MT0mUgg4A%3D&aa=1&ab=2"></script>
		<!-- base.css cache-bust: bump ?v= on every base.css edit -->
		<link rel="stylesheet" href="%sveltekit.assets%/css/base.css?v=20260715f" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
